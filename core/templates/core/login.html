{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>DeskFlow</h2>
        <p class="sub">Login to your account</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label>Password</label>
                {{ form.password }}
            </div>
            {% if form.errors %}
                <p style="color:#dc2626; font-size:0.85rem;">Invalid username or password.</p>
            {% endif %}
            <button type="submit" class="btn">Login</button>
        </form>

        <p class="auth-footer">New employee? <a href="{% url 'register' %}">Create an account</a></p>
    </div>
</div>
{% endblock %}
