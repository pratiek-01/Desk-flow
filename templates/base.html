{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DeskFlow</title>
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
</head>
<body>

    {% if user.is_authenticated %}
    <div class="navbar">
        <div class="brand">📋 DeskFlow</div>
        <div class="nav-right">
            <span>{{ user.username }} {% if user.is_staff %}(Admin){% endif %}</span>
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>
    {% endif %}

    <div class="container">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

</body>
</html>
